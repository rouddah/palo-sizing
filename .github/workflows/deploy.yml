# Ce workflow copie main vers gh-pages a chaque push.
# Le deploiement reel vers Cloudflare Pages se fait via :
#   npx wrangler pages deploy . --project-name palo-sizing
# avec le token Cloudflare lu depuis le Desktop (tokencloudflare.txt).
# Ce workflow est conserve comme sauvegarde (gh-pages = miroir de main).
name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
          force_orphan: true
