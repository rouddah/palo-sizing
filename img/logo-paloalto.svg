<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Palo Alto Networks Logo SVG -->
  <g>
    <!-- Icon: stylized PA flame/shield -->
    <polygon points="20,10 30,5 40,10 40,30 30,40 20,30" fill="#FA5416"/>
    <polygon points="30,5 40,10 40,30 30,20" fill="#C73D0D" opacity="0.7"/>
    <polygon points="20,10 30,20 30,40 20,30" fill="#FA5416" opacity="0.85"/>
    <!-- Text -->
    <text x="50" y="25" font-family="IBM Plex Sans, sans-serif" font-weight="700" font-size="13" fill="#ffffff">PALO ALTO</text>
    <text x="50" y="42" font-family="IBM Plex Sans, sans-serif" font-weight="400" font-size="11" fill="#FA5416">NETWORKS</text>
  </g>
</svg>
