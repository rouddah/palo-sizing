<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sizing Guide — Palo Alto Networks</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="header-root"></div>
  <script src="header.js"></script>

  <div class="hero">
    <h1>🔧 Outils Palo Alto Networks & Sizing Guide</h1>
    <p>Accédez à tous les outils et ressources de dimensionnement</p>
  </div>

  <div id="app"><p class="status-msg">⏳ Chargement…</p></div>

  <script src="links.js"></script>
  <script>
    try { renderApp(LINKS_DATA); }
    catch(err) {
      document.getElementById("app").innerHTML =
        `<p class="status-msg">❌ Erreur de chargement (${err.message})</p>`;
    }

    function renderCard(item) {
      const external = item.type === "external"
        ? 'target="_blank" rel="noopener noreferrer"' : "";
      return `
        <a class="tool-card" href="${item.href}" ${external}>
          <div class="card-header">
            <span class="card-title">${item.icon} ${item.title}</span>
          </div>
          <div class="card-description">${item.description}</div>
        </a>`;
    }

    function renderApp(data) {
      const app = document.getElementById("app");
      const { categories } = data;
      const navHTML = `<nav class="cat-nav" id="cat-nav">
        ${categories.map((cat, i) =>
          `<button data-index="${i}" class="${i === 0 ? "active" : ""}">${cat.title}</button>`
        ).join("")}
      </nav>`;
      const sectionsHTML = categories.map((cat, i) => `
        <section class="category-section ${i === 0 ? "visible" : ""}" id="cat-${i}">
          <div class="tools-grid">
            ${cat.items.map(renderCard).join("")}
          </div>
        </section>`).join("");
      app.innerHTML = navHTML + sectionsHTML;
      document.getElementById("cat-nav").addEventListener("click", e => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const idx = btn.dataset.index;
        document.querySelectorAll(".cat-nav button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".category-section").forEach(s => s.classList.remove("visible"));
        btn.classList.add("active");
        document.getElementById(`cat-${idx}`).classList.add("visible");
      });
    }
  </script>
</body>
</html>
