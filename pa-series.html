<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sizing Guide — PA-Series</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --label-w: 200px;
      --col-w:   148px;
    }

    /* ── Toolbars ── */
    .tb-wrap {
      position: relative; z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      flex-wrap: wrap;
    }

    .toolbar + .toolbar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    .tb-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .tb-sep {
      width: 1px; height: 20px;
      background: var(--border2);
      flex-shrink: 0;
    }

    .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }

    .fb {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .fb:hover { border-color: var(--border2); color: var(--text-bright); }
    .fb.on    { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .stats-bar {
      padding: 5px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
    }
    .stats-bar strong { color: var(--accent); }

    /* ── Table container ── */
    .table-outer {
      position: relative; z-index: 1;
      overflow: auto;
      height: calc(100vh - var(--header-h) - 110px);
    }

    .pa-table {
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      min-width: max-content;
    }

    /* ── Sticky label column ── */
    .th-corner,
    .spec-label-cell {
      position: sticky;
      left: 0;
      width: var(--label-w);
      min-width: var(--label-w);
      max-width: var(--label-w);
      z-index: 10;
    }

    .th-corner {
      background: var(--bg);
      z-index: 62;
      top: 0;
    }

    .spec-label-cell {
      background: var(--surface);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      border-right: 2px solid var(--border2);
      white-space: nowrap;
      transition: background .1s, border-right-color .1s;
    }

    /* ── Sticky header row ── */
    .col-header-row th {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
    }

    /* ── Model header card ── */
    .model-th {
      width: var(--col-w);
      min-width: var(--col-w);
      max-width: var(--col-w);
      padding: 5px 4px 0;
      vertical-align: bottom;
    }

    .model-card-clip { overflow: hidden; border-radius: 8px 8px 0 0; }

    .model-card-top {
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      cursor: pointer;
      transition: filter .15s;
    }
    .model-card-top:hover { filter: brightness(1.15); }

    .model-card-top::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background .15s;
    }
    .model-card-top:hover::before { background: rgba(255,255,255,0.08); }

    .model-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .model-target {
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      font-family: var(--mono);
      letter-spacing: 0.03em;
    }

    .model-card-bot {
      padding: 5px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .model-ds-link {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color .15s;
    }
    .model-ds-link:hover { color: rgba(255,255,255,0.9); }

    .sel-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      transition: all .15s;
      flex-shrink: 0;
    }
    .model-th.selected .sel-dot {
      background: var(--accent);
      border-color: var(--accent);
    }
    .model-th.selected .model-card-top { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* ── Value cells ── */
    .val-cell {
      width: var(--col-w);
      padding: 8px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      transition: background .1s;
      white-space: nowrap;
    }

    /* Zebra */
    tr.data-row:nth-child(even) .val-cell,
    tr.data-row:nth-child(even) .spec-label-cell { background: var(--surface2); }

    tr.data-row:hover .val-cell,
    tr.data-row:hover .spec-label-cell {
      background: rgba(232,75,26,0.06) !important;
    }
    tr.data-row:hover .spec-label-cell {
      border-right-color: var(--accent);
      color: var(--text-bright);
    }

    /* Max highlight */
    .val-max {
      color: var(--green) !important;
      font-weight: 700;
    }
    .val-max::after {
      content: ' ↑';
      font-size: 9px;
      opacity: 0.7;
    }

    .val-na { color: var(--text-muted); opacity: 0.45; }

    .badge-yes {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 10px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--green);
    }

    /* EoS model styling */
    .badge-eos-pa {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 10px;
      background: rgba(234,179,8,0.12);
      border: 1px solid rgba(234,179,8,0.4);
      color: #ca8a04;
    }
    .model-th.eos-model .model-card-top::after {
      content: 'EoS';
      position: absolute;
      top: 5px; right: 7px;
      background: rgba(234,179,8,0.25);
      border: 1px solid rgba(234,179,8,0.6);
      color: #fbbf24;
      font-size: 8px;
      font-family: var(--mono);
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.07em;
    }

    /* Measurement note in stats bar */
    .stats-note {
      margin-left: auto;
      font-size: 9px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Category rows ── */
    .cat-row td {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      padding: 0;
    }

    .cat-row td.cat-label-cell {
      position: sticky;
      left: 0;
      z-index: 40;
      background: var(--bg2);
      border-right: 2px solid var(--accent);
    }

    .cat-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
    }

    .cat-inner-text {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-bright);
    }

    /* ── Row entrance animation ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    tr.data-row { animation: slideIn .2s ease backwards; }

    /* ── Hidden modifier ── */
    .col-hidden { display: none; }

    /* ── Compare button ── */
    .cmp-fab {
      position: fixed;
      top: calc(var(--header-h) + 10px);
      right: 20px;
      z-index: 200;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(232,75,26,0.4);
      transition: transform .15s, box-shadow .15s;
    }
    .cmp-fab:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,75,26,0.5); }
    .cmp-fab.visible { display: flex; }

    /* ── Compare modal ── */
    .cmp-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 300;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
      overflow-y: auto;
    }
    .cmp-overlay.open { display: flex; }

    .cmp-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 92vw;
      max-width: 1000px;
      position: relative;
    }

    .cmp-title {
      font-size: 16px; font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 20px;
    }

    .cmp-close {
      position: absolute; top: 18px; right: 18px;
      width: 30px; height: 30px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      color: var(--text-muted); font-size: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .cmp-close:hover { color: var(--text-bright); }

    .cmp-table { width: 100%; border-collapse: collapse; font-size: 12px; overflow: auto; }
    .cmp-table th, .cmp-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); text-align: center; }
    .cmp-table thead th { background: var(--surface2); font-family: var(--mono); font-size: 12px; font-weight: 700; position: sticky; top: 0; }
    .cmp-table td:first-child { text-align: left; color: var(--text-muted); font-family: var(--mono); font-size: 11px; background: var(--surface); position: sticky; left: 0; }
    .cmp-table tr:hover td { background: var(--surface2) !important; }
    .ct-max { color: var(--green); font-weight: 700; font-family: var(--mono); }
    .ct-val { font-family: var(--mono); color: var(--text); }
  </style>
</head>
<body>
  <div id="header-root"></div>

      <span class="tb-label">Format</span>
      <div class="filter-group" id="form-filters">
        <button class="fb on" data-form="all"     onclick="filterForm(this)">Tous</button>
        <button class="fb" data-form="Desktop"    onclick="filterForm(this)">Desktop</button>
        <button class="fb" data-form="1U Rack"    onclick="filterForm(this)">1U Rack</button>
        <button class="fb" data-form="2U Rack"    onclick="filterForm(this)">2U Rack</button>
        <button class="fb" data-form="Chassis"    onclick="filterForm(this)">Chassis</button>
      </div>
    </div>
    <div class="stats-bar">
      <span>Modèles affichés : <strong id="stat-models">25</strong></span>
      <span>Cliquez sur un modèle pour le sélectionner · max 4 pour comparer</span>

    </div>
  </div>

  <!-- ── Table ── -->
  <div class="table-outer">
    <table class="pa-table" id="pa-table">
      <thead>
        <tr class="col-header-row" id="header-row">
          <th class="th-corner"></th>
          <!-- model columns injected by JS -->
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- rows injected by JS -->
      </tbody>
    </table>
  </div>

  <button class="cmp-fab" id="cmp-fab" onclick="openCompare()">

    Comparer (<span id="cmp-count">0</span>)
  </button>

  const CATS = {
    perf:  { label:'Performances',    icon:'▸' },
    sess:  { label:'Sessions',        icon:'▸' },
    cap:   { label:'Capacités',       icon:'▸' },
    ports: { label:'Interfaces',      icon:'▸' },
    hw:    { label:'Hardware',        icon:'▸' },

    prix:  { label:'Prix & SKU',      icon:'▸' },
  };

  /* ══ State ══ */
  let activeCat    = 'all';
  let activeSeries = 'all';
  let activeForm   = 'all';
  let selected     = new Set();

  /* ══ Build table ══ */
  function buildTable() {
    const visible = MODELS.filter(m =>
      (activeSeries === 'all' || m.s === activeSeries) &&
      (activeForm   === 'all' || m.f.startsWith(activeForm))
    );

    // Header
    const hRow = document.getElementById('header-row');
    const DS_URLS = {
      'PA-400':  'https://www.paloaltonetworks.com/resources/datasheets/pa-400-series',
      'PA-500':  'https://www.paloaltonetworks.com/resources/datasheets/pa-500-series',
      'PA-800':  'https://www.paloaltonetworks.com/resources/datasheets/pa-800-series-datasheet',
      'PA-1400': 'https://www.paloaltonetworks.com/resources/datasheets/pa-1400-series',
      'PA-3400': 'https://www.paloaltonetworks.com/resources/datasheets/pa-3400-series',
      'PA-5400': 'https://www.paloaltonetworks.com/resources/datasheets/pa-5400-series',
      'PA-7000': 'https://www.paloaltonetworks.com/resources/datasheets/pa-7000-series',
      'PA-7500': 'https://www.paloaltonetworks.com/resources/datasheets/pa-7500-series',
    };
    hRow.innerHTML = `<th class="th-corner"></th>` +
      visible.map(m => `
        <th class="model-th ${selected.has(m.id)?'selected':''} ${m.eos?'eos-model':''}" id="mh-${m.id}" onclick="toggleSel('${m.id}')">
          <div class="model-card-clip">
            <div class="model-card-top" style="background:${m.color}">
              <span class="model-name">${m.id}</span>
              <span class="model-target">${m.target}</span>
            </div>
            <div class="model-card-bot" style="background:${m.color}22">
              <a class="model-ds-link" href="${DS_URLS[m.s] || '#'}" target="_blank" rel="noopener">↗ Datasheet</a>
              <div class="sel-dot"></div>
            </div>
          </div>
        </th>`).join('');

    // Body
    let seenCats = new Set();
    let html     = '';
    let delay    = 0;

    ROWS.forEach(row => {
      if (activeCat !== 'all' && row.cat !== activeCat) return;

      // Category separator
      const catKey = row.cat;
      if (!seenCats.has(catKey) && CATS[catKey]) {
        seenCats.add(catKey);
        html += `<tr class="cat-row">
          <td class="cat-label-cell">
            <div class="cat-inner">
              <span class="cat-inner-text">${CATS[catKey].label}</span>
            </div>
          </td>
          ${visible.map(() => '<td class="cat-spacer"></td>').join('')}
        </tr>`;
      }

      // Find max numeric value across visible models (for highlighting)
      let maxVal = -Infinity;
      if (row.num) {
        visible.forEach(m => { const v = row.num(m); if(v > maxVal) maxVal = v; });
      }

      const cells = visible.map(m => {
        const raw = row.fn(m);
        const num = row.num ? row.num(m) : null;
        const isMax = num !== null && num === maxVal && maxVal > 0;
        const isNa  = raw === '—';
        let cls = 'val-cell';
        if (isMax) cls += ' val-max';
        else if (isNa) cls += ' val-na';
        return `<td class="${cls}" style="border-left-color:${m.color}22">${raw}</td>`;
      }).join('');

      html += `<tr class="data-row" style="animation-delay:${delay}ms">
        <td class="spec-label-cell">${row.label}</td>
        ${cells}
      </tr>`;
      delay += 12;
    });

    document.getElementById('table-body').innerHTML = html;
    document.getElementById('stat-models').textContent = visible.length;
  }

  /* ══ Filters ══ */
  function filterCat(btn) {
    document.querySelectorAll('#cat-filters .fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeCat = btn.dataset.cat;
    buildTable();
  }

  function filterSeries(btn) {
    document.querySelectorAll('#series-filters .fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeSeries = btn.dataset.series;
    buildTable();
  }

  function filterForm(btn) {
    document.querySelectorAll('#form-filters .fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeForm = btn.dataset.form;
    buildTable();
  }

  /* ══ Selection ══ */
  function toggleSel(id) {
    if (selected.has(id)) {
      selected.delete(id);
    } else {
      if (selected.size >= 4) return;
      selected.add(id);
    }
    document.querySelectorAll(`[id="mh-${id}"]`).forEach(el => el.classList.toggle('selected', selected.has(id)));
    const fab   = document.getElementById('cmp-fab');
    const count = document.getElementById('cmp-count');
    count.textContent = selected.size;
    fab.classList.toggle('visible', selected.size >= 2);
  }

  /* ══ Compare ══ */
  function openCompare() {
    const models = [...selected].map(id => MODELS.find(m => m.id === id)).filter(Boolean);
    const head = `<thead><tr><th></th>${models.map(m => `<th style="color:${m.color}">${m.id}</th>`).join('')}</tr></thead>`;

    const body = ROWS.map(row => {
      const vals = models.map(m => row.fn(m));
      const nums = models.map(m => row.num ? row.num(m) : null);
      const maxN = Math.max(...nums.filter(n => n !== null));
      const cells = vals.map((v, i) => {
        const isBest = nums[i] !== null && nums[i] === maxN && maxN > 0;
        return `<td class="${isBest ? 'ct-max' : 'ct-val'}">${v}</td>`;
      }).join('');
      return `<tr><td>${row.label}</td>${cells}</tr>`;
    }).join('');

    document.getElementById('cmp-table').innerHTML = head + `<tbody>${body}</tbody>`;
    document.getElementById('cmp-overlay').classList.add('open');
  }

  function closeCompare() {
    document.getElementById('cmp-overlay').classList.remove('open');
  }

  /* ══ Utils ══ */
  function fmtN(n) {
    if (n >= 1000000) return (n/1000000).toFixed(n%1000000===0?0:1) + 'M';
    if (n >= 1000)    return (n/1000).toFixed(0) + 'K';
    return String(n);
  }

  function fmtPrice(p) {
    if (!p) return '—';
    return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(p);
  }

  buildTable();
