<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mode Guidé - Sizing Palo Alto</title>
  <meta name="description" content="Wizard de sizing Palo Alto Networks pour profils non-techniques. 7 questions business pour obtenir une recommandation de premier niveau." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Wizard-specific styles — prefix .wiz- */
    .wiz-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .wiz-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .wiz-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .wiz-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .wiz-bar-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .wiz-q-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
    }
    .wiz-q-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .wiz-q-tip {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      border-left: 3px solid var(--border2);
    }
    .wiz-input-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }
    .wiz-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text-bright);
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 16px;
    }
    .wiz-input:focus { border-color: var(--accent); }
    .wiz-select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text-bright);
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    .wiz-select:focus { border-color: var(--accent); }
    .wiz-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .wiz-nav {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }
    .wiz-btn-next {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .wiz-btn-next:hover { opacity: 0.88; }
    .wiz-btn-back {
      padding: 12px 20px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .wiz-btn-back:hover { border-color: var(--accent); color: var(--text); }
    /* Results */
    .wiz-result-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }
    .wiz-result-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 14px;
    }
    .wiz-result-line {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .wiz-result-line strong { color: var(--text); }
    .wiz-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .wiz-tag.yellow {
      background: var(--yellow-dim);
      border-color: rgba(245,158,11,0.4);
      color: var(--yellow);
    }
    .wiz-tag.green {
      background: var(--green-dim);
      border-color: rgba(34,197,94,0.35);
      color: var(--green);
    }
    .wiz-tag.purple {
      background: rgba(139,92,246,0.12);
      border-color: rgba(139,92,246,0.35);
      color: var(--purple);
    }
    .wiz-detail-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .wiz-detail-link:hover { border-color: var(--accent); color: var(--accent); }
    .wiz-threshold-note {
      border-left: 3px solid var(--yellow);
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .wiz-action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .wiz-btn-restart {
      padding: 10px 20px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .wiz-btn-restart:hover { border-color: var(--accent); color: var(--accent); }
    .wiz-btn-export {
      padding: 10px 20px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .wiz-btn-export:hover { border-color: var(--accent); }
    .wiz-export-area {
      display: none;
      margin-top: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 320px;
      overflow-y: auto;
      cursor: text;
    }
    @media (max-width: 480px) {
      .wiz-q-block { padding: 20px 16px; }
      .wiz-wrap { padding: 24px 12px 60px; }
    }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <script src="header.js"></script>

  <div class="wiz-wrap">
    <div class="page-header" style="margin-bottom:28px">
      <h1>Mode guidé</h1>
      <p>Recommandation Palo Alto en 7 questions - Pas de jargon technique requis</p>
    </div>

    <div id="wiz-form">
      <div class="wiz-progress">
        <span class="wiz-bar-label" id="wiz-bar-label">Question 1 / 7</span>
        <div class="wiz-bar-track">
          <div class="wiz-bar-fill" id="wiz-bar-fill" style="width:14%"></div>
        </div>
      </div>
      <div class="wiz-q-block" id="wiz-q-block">
        <!-- injected by JS -->
      </div>
    </div>

    <div id="wiz-result" style="display:none">
      <!-- injected by JS -->
    </div>
  </div>

  <footer class="site-footer">
    <div>Sizing Guide PANW · by <a href="https://partner-connect.exclusive-labs.com" target="_blank" rel="noopener">Exclusive Networks</a></div>
    <div style="margin-top:4px;font-size:10px">Recommandation indicative de premier niveau - Ne remplace pas un sizing officiel Palo Alto</div>
  </footer>

  <script>
  (function () {
    var STORAGE_KEY = 'wiz_state';
    var state = {};
    var step = 1;
    var TOTAL = 7;

    try { var _s = sessionStorage.getItem(STORAGE_KEY); if (_s) state = JSON.parse(_s); } catch(e) {}
    function save() { try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

    /* Bandwidth mapping per site size (Mbps per site) */
    var SITE_BW = { 'Tres petit': 20, 'Petit': 50, 'Moyen': 100, 'Grand': 250, 'Tres grand': 500 };

    var SITE_SIZES = [
      { val: 'Tres petit',  label: 'Tres petit (1 - 10 personnes)'   },
      { val: 'Petit',       label: 'Petit (10 - 50 personnes)'        },
      { val: 'Moyen',       label: 'Moyen (50 - 150 personnes)'       },
      { val: 'Grand',       label: 'Grand (150 - 500 personnes)'      },
      { val: 'Tres grand',  label: 'Tres grand (500+ personnes)'      }
    ];

    var QUESTIONS = [
      {
        n: 1, key: 'users_onsite', type: 'number', ph: 'ex : 200',
        title: 'Combien de collaborateurs travaillent depuis vos sites (bureaux, agences, magasins, usines) ?',
        tip: 'Personnes connectees au reseau local de l\'un de vos sites.'
      },
      {
        n: 2, key: 'users_remote', type: 'number', ph: 'ex : 80',
        title: 'Combien travaillent en teletravail, en mobilite ou depuis l\'exterieur de vos sites ?',
        tip: 'Personnes qui se connectent a distance, depuis chez elles ou en deplacement. Inclut les hybrides.'
      },
      {
        n: 3, type: 'sites',
        title: 'Combien de sites distants a connecter, et quelle est leur taille typique ?',
        tip: 'Un site = un emplacement physique. Si vous avez des sites de tailles tres differentes, choisissez la taille moyenne.'
      },
      {
        n: 4, key: 'internet_filtering', type: 'choices',
        title: 'Avez-vous besoin de filtrer le trafic Internet de vos utilisateurs (categories web, controle des SaaS) ?',
        tip: 'Filtrage des sites web, blocage des categories a risque, controle des SaaS comme Office 365, Dropbox...',
        choices: ['Oui', 'Non', 'Je ne sais pas']
      },
      {
        n: 5, key: 'private_apps', type: 'choices',
        title: 'Avez-vous des applications internes (intranet, ERP, fichiers, code source, bases de donnees) que vos utilisateurs doivent atteindre a distance ?',
        tip: 'Applications hebergees dans votre datacenter ou reseau interne, accessibles en teletravail.',
        choices: ['Oui', 'Non', 'Je ne sais pas']
      },
      {
        n: 6, key: 'iot_ot', type: 'choices',
        title: 'Avez-vous des objets connectes non-PC (imprimantes, cameras, IoT, materiel industriel/medical) a proteger sur votre reseau ?',
        tip: 'Tout appareil connecte qui n\'est pas un PC ou serveur classique.',
        choices: ['Oui', 'Non', 'Je ne sais pas']
      },
      {
        n: 7, key: 'soc_posture', type: 'choices',
        title: 'Comment decririez-vous votre supervision des alertes de securite aujourd\'hui ?',
        tip: 'Un SOC (Security Operations Center) surveille les alertes de securite en temps reel.',
        choices: [
          'SOC en place, on cherche a le moderniser',
          'Pas de SOC, on veut en construire un',
          'Pas de SOC interne, on prefere externaliser (MSSP/MDR)',
          'Je ne sais pas'
        ]
      }
    ];

    /* ── Render a question step ── */
    function renderStep() {
      var pct = Math.round((step / TOTAL) * 100);
      document.getElementById('wiz-bar-label').textContent = 'Question ' + step + ' / ' + TOTAL;
      document.getElementById('wiz-bar-fill').style.width = pct + '%';
      var q = QUESTIONS[step - 1];
      var block = document.getElementById('wiz-q-block');
      var h = '';
      h += '<div class="wiz-q-title">' + q.title + '</div>';
      h += '<div class="wiz-q-tip">' + q.tip + '</div>';

      if (q.type === 'number') {
        h += '<label class="wiz-input-label">Nombre</label>';
        h += '<input class="wiz-input" id="wiz-num" type="number" min="0" placeholder="' + q.ph + '" value="' + (state[q.key] !== undefined ? state[q.key] : '') + '" />';
      } else if (q.type === 'sites') {
        h += '<label class="wiz-input-label">Nombre de sites</label>';
        h += '<input class="wiz-input" id="wiz-nb-sites" type="number" min="0" placeholder="ex : 5" value="' + (state.nb_sites !== undefined ? state.nb_sites : '') + '" />';
        h += '<label class="wiz-input-label">Taille typique d\'un site</label>';
        h += '<select class="wiz-select" id="wiz-site-size"><option value="">-- Selectionner --</option>';
        SITE_SIZES.forEach(function(sz) {
          h += '<option value="' + sz.val + '"' + (state.site_size === sz.val ? ' selected' : '') + '>' + sz.label + '</option>';
        });
        h += '</select>';
      } else if (q.type === 'choices') {
        h += '<div class="wiz-choices">';
        q.choices.forEach(function(c) {
          h += '<button class="mode-btn' + (state[q.key] === c ? ' selected' : '') + '" data-val="' + c + '">' + c + '</button>';
        });
        h += '</div>';
      }

      h += '<div class="wiz-nav">';
      if (step > 1) h += '<button class="wiz-btn-back" id="wiz-back">Precedent</button>';
      h += '<button class="wiz-btn-next" id="wiz-next">' + (step < TOTAL ? 'Suivant' : 'Voir ma recommandation') + '</button>';
      h += '</div>';
      block.innerHTML = h;

      if (q.type === 'choices') {
        block.querySelectorAll('.mode-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            block.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            state[q.key] = btn.dataset.val;
            save();
          });
        });
      }

      var backBtn = document.getElementById('wiz-back');
      if (backBtn) backBtn.addEventListener('click', function() { step--; renderStep(); });
      document.getElementById('wiz-next').addEventListener('click', function() {
        if (!collectStep(q)) return;
        if (step < TOTAL) { step++; renderStep(); } else { showResult(); }
      });
    }

    function collectStep(q) {
      if (q.type === 'number') {
        var v = document.getElementById('wiz-num').value.trim();
        if (v === '' || isNaN(parseInt(v, 10))) { alert('Veuillez saisir un nombre.'); return false; }
        state[q.key] = parseInt(v, 10);
        save();
      } else if (q.type === 'sites') {
        var nb = document.getElementById('wiz-nb-sites').value.trim();
        if (nb === '' || isNaN(parseInt(nb, 10))) { alert('Veuillez indiquer le nombre de sites.'); return false; }
        state.nb_sites = parseInt(nb, 10);
        state.site_size = document.getElementById('wiz-site-size').value || 'Moyen';
        save();
      } else if (q.type === 'choices') {
        if (!state[q.key]) { alert('Veuillez selectionner une reponse.'); return false; }
      }
      return true;
    }

    /* ── Sizing calculations ── */
    function calcUnits() {
      var mu = state.users_remote || 0;
      var bwPerSite = SITE_BW[state.site_size] || 100;
      var mbps_rn = bwPerSite * (state.nb_sites || 0);
      return { mu: mu, mbps_rn: mbps_rn, total: mu + mbps_rn };
    }

    /* Source: WIZARD_V2_DELTA.md — ~5 Mbps soutenu/user actif, marge 50% sur debit Threat Prevention */
    function ngfwModel(users) {
      if (!users || users <= 0) return null;
      var tiers = [
        { max: 10,       entry: 'PA-410',              comfort: 'PA-415',             family: 'PA-400' },
        { max: 30,       entry: 'PA-415 ou PA-440',    comfort: 'PA-445',             family: 'PA-400' },
        { max: 75,       entry: 'PA-440',              comfort: 'PA-450',             family: 'PA-400' },
        { max: 150,      entry: 'PA-450',              comfort: 'PA-455 ou PA-460',   family: 'PA-400' },
        { max: 300,      entry: 'PA-460',              comfort: 'PA-1410',            family: 'PA-400 / PA-1400' },
        { max: 700,      entry: 'PA-1410',             comfort: 'PA-1420',            family: 'PA-1400' },
        { max: 1500,     entry: 'PA-1420',             comfort: 'PA-3410',            family: 'PA-1400 / PA-3400' },
        { max: 3000,     entry: 'PA-3410',             comfort: 'PA-3420',            family: 'PA-3400' },
        { max: 6000,     entry: 'PA-3420 ou PA-3430',  comfort: 'PA-3440 ou PA-5410', family: 'PA-3400 / PA-5400' },
        { max: 15000,    entry: 'PA-5410',             comfort: 'PA-5420',            family: 'PA-5400' },
        { max: 30000,    entry: 'PA-5430',             comfort: 'PA-5440',            family: 'PA-5400' },
        { max: 50000,    entry: 'PA-5445 ou PA-5450',  comfort: 'PA-7000',            family: 'PA-5400 / PA-7000' },
        { max: Infinity, entry: 'PA-7000',             comfort: 'PA-7500',            family: 'PA-7000 / PA-7500' }
      ];
      for (var i = 0; i < tiers.length; i++) {
        if (users <= tiers[i].max) return tiers[i];
      }
      return tiers[tiers.length - 1];
    }

    function prismaEdition() {
      var web = state.internet_filtering;
      var priv = state.private_apps;
      if (web === 'Je ne sais pas' || priv === 'Je ne sais pas') {
        return { edition: 'Enterprise Edition', note: 'Configuration de couverture maximale, a raffiner avec le client.' };
      }
      if (web === 'Oui' && priv === 'Non') {
        return { edition: 'SWG Edition', note: 'Filtrage Internet et SaaS uniquement - pas d\'applications privees a securiser.' };
      }
      if (web === 'Non' && priv === 'Oui') {
        return { edition: 'ZTNA Edition', note: 'Acces Zero Trust aux applications internes uniquement (Mobile Users seulement - Remote Networks non disponibles en ZTNA Edition).' };
      }
      return { edition: 'Enterprise Edition', note: 'Couvre a la fois la securite Internet et l\'acces aux applications privees.' };
    }

    function socReco() {
      var soc = state.soc_posture;
      var endpoints = (state.users_onsite || 0) + (state.users_remote || 0);
      if (endpoints < 200) {
        return {
          belowThreshold: true,
          prod: 'Cortex XDR Prevent',
          note: 'Deux options : Cortex XDR Prevent comme remplacement antivirus avance, ou externalisation via Managed XSIAM ou Unit 42 MDR chez un MSSP partenaire (mutualisation des seuils).'
        };
      }
      if (soc === 'SOC en place, on cherche a le moderniser') {
        return { prod: 'Cortex XSIAM', note: 'XSIAM consolide SIEM + SOAR + EDR en une plateforme IA. Inclut Cortex AgentiX. Ideal pour moderniser et consolider un SOC existant.' };
      }
      if (soc === 'Pas de SOC, on veut en construire un') {
        return { prod: 'Cortex XDR Pro per Endpoint', note: 'Point de depart accessible : XDR Pro couvre la detection endpoint, la correlation reseau/cloud et le threat hunting. Evolutif vers XSIAM si la volumetrie d\'ingest le justifie.' };
      }
      if (soc === 'Pas de SOC interne, on prefere externaliser (MSSP/MDR)') {
        return { prod: 'Managed XSIAM ou Unit 42 MDR', note: 'Externalisation via MSSP partenaire. Managed XSIAM pour une supervision SOC complete, Unit 42 MDR pour la reponse aux incidents et le threat hunting.' };
      }
      return { prod: 'XDR Prevent', note: 'Demarrer par Cortex XDR Prevent pour la prevention endpoint. Voir avec le SE Palo Alto pour la suite selon les besoins SOC.' };
    }

    /* ── Export text (markdown, copiable) ── */
    function buildExport(units, ed, ngfw, soc) {
      var onsite = state.users_onsite || 0;
      var remote = state.users_remote || 0;
      var nb = state.nb_sites || 0;
      var sz = state.site_size || '-';
      var bw = SITE_BW[sz] || 100;
      var lines = [];
      lines.push('# Recommandation Palo Alto - Premier niveau');
      lines.push('Genere par Sizing Guide Exclusive Networks - ' + new Date().toLocaleDateString('fr-FR'));
      lines.push('');
      lines.push('## Donnees saisies');
      lines.push('- Utilisateurs sur site : ' + onsite);
      lines.push('- Utilisateurs en teletravail / mobilite : ' + remote);
      lines.push('- Sites distants : ' + nb + ' (' + sz + ')');
      lines.push('- Filtrage Internet : ' + (state.internet_filtering || '-'));
      lines.push('- Applications privees : ' + (state.private_apps || '-'));
      lines.push('- Objets connectes IoT/OT : ' + (state.iot_ot || '-'));
      lines.push('- Maturite SOC : ' + (state.soc_posture || '-'));
      lines.push('');
      if (remote > 0 || nb > 0) {
        lines.push('## Prisma Access - SASE');
        if (units.total < 200) {
          lines.push('- Volumetrie sous le seuil commercial (200 unites min)');
          lines.push('- Total calcule : ' + units.mu + ' MU + ' + units.mbps_rn + ' Mbps RN = ' + units.total + ' unites');
          lines.push('- Options : MSSP PAYG, surdimensionnement vers 200 unites, ou NGFW seul');
        } else {
          var scope = units.total >= 1000 ? 'Worldwide Edition' : 'Local Edition';
          lines.push('- Edition : ' + ed.edition + ' (' + scope + ')');
          lines.push('- Mobile Users : ' + units.mu);
          if (nb > 0) lines.push('- Remote Networks : ' + nb + ' sites / ' + units.mbps_rn + ' Mbps estimes (' + bw + ' Mbps/site ' + sz.toLowerCase() + ')');
          lines.push('- Total unites SASE : ' + units.total);
          if (state.iot_ot === 'Oui') lines.push('- Add-on : Device Security');
          if (remote > 500) lines.push('- Add-on : ADEM (monitoring experience utilisateur)');
          if (['Moyen','Grand','Tres grand'].indexOf(sz) !== -1 && nb > 0) lines.push('- Add-on : App Acceleration');
        }
        lines.push('');
      }
      if (onsite > 0 && ngfw) {
        lines.push('## PA-Series - NGFW');
        lines.push('- Modele entry : ' + ngfw.entry + ' (famille ' + ngfw.family + ')');
        lines.push('- Modele confort : ' + ngfw.comfort);
        lines.push('- Bundle recommande : Precision AI Pro Bundle');
        lines.push('- Sizing base sur ~5 Mbps soutenu/user actif, marge 50% sur debit Threat Prevention');
        if (nb >= 3) lines.push('- Management centralise recommande : Strata Cloud Manager ou Panorama');
        lines.push('- Si HA requise : doubler les appliances');
        lines.push('');
      }
      lines.push('## Cortex - SecOps');
      lines.push('- Recommandation : ' + soc.prod);
      lines.push('- ' + soc.note);
      lines.push('');
      lines.push('## Elements obligatoires a prevoir');
      if ((remote > 0 || nb > 0) && units.total >= 200) {
        lines.push('- Strata Logging Service (obligatoire avec Prisma Access, SKU separee)');
        lines.push('- Strata Cloud Manager Essentials (gratuit)');
        lines.push('- Cloud Identity Engine (gratuit, User-ID)');
      }
      if (nb >= 2) lines.push('- Panorama ou Strata Cloud Manager (gestion multi-sites)');
      lines.push('');
      lines.push('## Avertissement');
      lines.push('Recommandation indicative pour qualification de premier niveau. Ne remplace pas un POC, un sizing officiel Palo Alto, ni une consultation avec votre SE. Tarif non affiche. Pour un devis : partner-connect.exclusive-labs.com');
      return lines.join('\n');
    }

    /* ── Result screen ── */
    function showResult() {
      document.getElementById('wiz-form').style.display = 'none';
      var r = document.getElementById('wiz-result');
      r.style.display = 'block';

      var onsite = state.users_onsite || 0;
      var remote = state.users_remote || 0;
      var nb = state.nb_sites || 0;
      var sz = state.site_size || 'Moyen';
      var units = calcUnits();
      var ed = prismaEdition();
      var ngfw = ngfwModel(onsite);
      var soc = socReco();
      var hasSASE = (remote > 0 || nb > 0);
      var hasNGFW = (onsite > 0 || nb > 0) && ngfw;

      var h = '';
      h += '<div style="margin-bottom:20px">';
      h += '<h2 style="font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:6px">Votre recommandation de premier niveau</h2>';
      h += '<p style="font-size:12px;color:var(--text-muted)">Basee sur vos reponses - Indicatif - Mis a jour juin 2026</p>';
      h += '</div>';

      /* === SASE === */
      if (hasSASE) {
        h += '<div class="wiz-result-block">';
        h += '<div class="wiz-result-title">Prisma Access - SASE</div>';
        if (units.total < 200) {
          h += '<div class="wiz-threshold-note">';
          h += '<strong style="color:var(--yellow)">Volumetrie sous le seuil commercial Prisma Access (200 unites minimum)</strong><br>';
          h += 'Total calcule : ' + units.mu + ' Mobile Users + ' + units.mbps_rn + ' Mbps Remote Networks = <strong>' + units.total + ' unites</strong>.<br>';
          h += '1 unite = 1 Mobile User OU 1 Mbps Remote Network.<br><br>';
          h += 'Options :<br>';
          h += '- Mutualiser via un MSSP partenaire en mode PAYG<br>';
          h += '- Surdimensionner volontairement pour atteindre 200 unites si la croissance est prevue<br>';
          h += '- Rester sur NGFW seul avec GlobalProtect sur l\'appliance (clients existants - SKUs GP NGFW en End-of-Sale depuis 15 aout 2025)';
          h += '</div>';
        } else {
          var scope = units.total >= 1000 ? 'Worldwide Edition' : 'Local Edition';
          h += '<div class="wiz-result-line"><strong>Edition :</strong> <span class="wiz-tag">' + ed.edition + '</span> <span class="wiz-tag">' + scope + '</span></div>';
          h += '<div class="wiz-result-line" style="font-size:12px">' + ed.note;
          if (units.total >= 1000) h += ' Worldwide Edition : acces aux 100+ PoP mondiaux.';
          else h += ' Local Edition : 5 PoP regionaux.';
          h += '</div>';
          h += '<div class="wiz-result-line" style="margin-top:10px"><strong>Mobile Users :</strong> ' + units.mu + '</div>';
          if (nb > 0) {
            var bw = SITE_BW[sz] || 100;
            h += '<div class="wiz-result-line"><strong>Remote Networks :</strong> ' + nb + ' site(s) - ' + units.mbps_rn + ' Mbps (' + bw + ' Mbps/site ' + sz.toLowerCase() + ')</div>';
          }
          h += '<div class="wiz-result-line"><strong>Total unites SASE :</strong> ' + units.total + '</div>';
          var addons = [];
          if (state.iot_ot === 'Oui') addons.push('<span class="wiz-tag yellow">Device Security</span>');
          if (remote > 500) addons.push('<span class="wiz-tag yellow">ADEM</span>');
          if (['Moyen','Grand','Tres grand'].indexOf(sz) !== -1 && nb > 0) addons.push('<span class="wiz-tag yellow">App Acceleration</span>');
          if (addons.length) h += '<div class="wiz-result-line" style="margin-top:10px"><strong>Add-ons recommandes :</strong> ' + addons.join(' ') + '</div>';
        }
        h += '<a class="wiz-detail-link" href="prisma.html">Voir le detail Prisma Access</a>';
        h += '</div>';
      }

      /* === NGFW === */
      if (hasNGFW) {
        h += '<div class="wiz-result-block">';
        h += '<div class="wiz-result-title">Firewalls PA-Series - NGFW</div>';
        h += '<div class="wiz-result-line"><strong>Modele entry :</strong> <span class="wiz-tag">' + ngfw.entry + '</span> <span style="font-size:11px;color:var(--text-muted)">famille ' + ngfw.family + '</span></div>';
        h += '<div class="wiz-result-line"><strong>Modele confort :</strong> <span class="wiz-tag">' + ngfw.comfort + '</span></div>';
        h += '<div class="wiz-result-line" style="font-size:11px;color:var(--text-muted);margin-top:2px">Sizing indicatif base sur ~5 Mbps soutenu par user actif et une marge a 50% du debit Threat Prevention de l\'appliance. Pour un sizing precis, contacter votre SE Palo Alto via Exclusive Networks.</div>';
        h += '<div class="wiz-result-line" style="margin-top:12px"><strong>Bundle :</strong> <span class="wiz-tag green">Precision AI Pro Bundle</span></div>';
        h += '<div class="wiz-result-line" style="font-size:12px;color:var(--text-muted)">Inclut Advanced Threat Prevention, WildFire, URL Filtering, DNS Security, SD-WAN et Device Security. Recommandation Palo Alto actuelle depuis le 18 dec. 2025.</div>';
        if (nb >= 3) {
          h += '<div class="wiz-result-line" style="margin-top:10px"><strong>Management centralise recommande :</strong> Strata Cloud Manager (cloud) ou Panorama (on-prem).</div>';
        }
        h += '<div class="wiz-result-line" style="margin-top:8px;font-size:12px;color:var(--yellow)">Doubler les appliances si la haute disponibilite (HA) est requise.</div>';
        h += '<a class="wiz-detail-link" href="pa-series.html">Voir le detail PA-Series</a>';
        h += '</div>';
      }

      /* === Cortex === */
      h += '<div class="wiz-result-block">';
      h += '<div class="wiz-result-title">SecOps - Cortex</div>';
      if (soc.belowThreshold) {
        h += '<div class="wiz-threshold-note">';
        h += '<strong style="color:var(--yellow)">Sous 200 endpoints</strong> : le seuil commercial Cortex XDR Pro / XSIAM est eleve.<br><br>';
        h += soc.note;
        h += '</div>';
      } else {
        h += '<div class="wiz-result-line"><strong>Recommandation :</strong> <span class="wiz-tag purple">' + soc.prod + '</span></div>';
        h += '<div class="wiz-result-line" style="font-size:12px">' + soc.note + '</div>';
        h += '<div class="wiz-result-line" style="margin-top:10px;font-size:12px;color:var(--text-muted)">Ajouter <strong style="color:var(--text)">Cortex Cloud</strong> si l\'organisation a des workloads dans AWS, Azure ou GCP (CNAPP + Cloud Detection and Response).</div>';
      }
      h += '<a class="wiz-detail-link" href="cortex.html">Voir le detail Cortex</a>';
      h += '</div>';

      /* === Elements obligatoires === */
      h += '<div class="wiz-result-block">';
      h += '<div class="wiz-result-title">Elements souvent oublies</div>';
      var must = [];
      if (hasSASE && units.total >= 200) {
        must.push('<strong>Strata Logging Service</strong> - obligatoire avec Prisma Access (SKU separee, a dimensionner)');
        must.push('<strong>Strata Cloud Manager Essentials</strong> - gratuit, inclus par defaut');
        must.push('<strong>Cloud Identity Engine</strong> - gratuit, recommande pour User-ID');
      }
      if (hasNGFW && nb >= 2) {
        must.push('<strong>Panorama ou Strata Cloud Manager</strong> - gestion multi-sites recommandee');
      }
      if ((soc.prod === 'Cortex XSIAM' || soc.prod === 'Cortex XDR Pro per Endpoint') && hasSASE && units.total >= 200) {
        must.push('<strong>Strata Logging Service</strong> - mutualise avec Prisma Access si present');
      }
      if (must.length === 0) {
        must.push('Contacter votre SE Palo Alto pour la liste des pre-requis specifiques a votre architecture.');
      }
      var seen = {};
      must.forEach(function(m) {
        if (!seen[m]) { seen[m] = true; h += '<div class="wiz-result-line">- ' + m + '</div>'; }
      });
      h += '<a class="wiz-detail-link" href="panorama.html">Panorama et Strata Cloud Manager</a>';
      h += '</div>';

      /* === Disclaimer === */
      h += '<div class="wiz-result-block" style="border-left:3px solid var(--yellow)">';
      h += '<div class="wiz-result-title" style="color:var(--yellow)">Avertissement</div>';
      h += '<div class="wiz-result-line">Cette recommandation est indicative pour qualification de premier niveau. Elle ne remplace pas un POC, un sizing officiel Palo Alto, ni une consultation avec votre SE. Le tarif n\'est jamais affiche : pour un devis, contacter votre interlocuteur Exclusive Networks via <a href="https://partner-connect.exclusive-labs.com" target="_blank" rel="noopener" style="color:var(--yellow)">partner-connect.exclusive-labs.com</a>.</div>';
      h += '</div>';

      /* === Actions === */
      h += '<div class="wiz-action-row">';
      h += '<button class="wiz-btn-restart" id="wiz-restart">Recommencer le wizard</button>';
      h += '<button class="wiz-btn-export" id="wiz-export">Exporter le resultat</button>';
      h += '</div>';
      h += '<div class="wiz-export-area" id="wiz-export-area"></div>';

      r.innerHTML = h;

      document.getElementById('wiz-restart').addEventListener('click', function() {
        state = {}; step = 1;
        try { sessionStorage.removeItem(STORAGE_KEY); } catch(e) {}
        r.style.display = 'none';
        document.getElementById('wiz-form').style.display = 'block';
        renderStep();
      });

      var exportArea = document.getElementById('wiz-export-area');
      var exportBtn  = document.getElementById('wiz-export');
      var exportText = buildExport(units, ed, ngfw, soc);

      exportBtn.addEventListener('click', function() {
        if (exportArea.style.display === 'block') {
          exportArea.style.display = 'none';
          exportBtn.textContent = 'Exporter le resultat';
          return;
        }
        exportArea.textContent = exportText;
        exportArea.style.display = 'block';
        if (navigator.clipboard) {
          navigator.clipboard.writeText(exportText).then(function() {
            exportBtn.textContent = 'Copie dans le presse-papier !';
            setTimeout(function() { exportBtn.textContent = 'Exporter le resultat'; }, 2500);
          }).catch(function() {});
        }
      });
    }

    renderStep();
  })();
  </script>
</body>
</html>
